# Rapax MariaDB Exporter - Table Rotation Configuration
#
# This file controls how long data is retained in MariaDB tables.
# Tables older than the specified retention period will be automatically dropped.
# The rotation check runs every 12 hours.
#
# Format: stream_name = days_to_retain

[retention]
# Alerts - Keep for 30 days (good for incident analysis)
alerts = 30

# Logs - Keep for 7 days (high volume, short-term troubleshooting)
logs = 7

# Stats - Keep for 7 days (high volume metrics)
stats = 7

# Devices - Keep for 365 days (device inventory history)
devices = 365

# Services - Keep for 365 days (service topology history)
services = 365
