# Rapax MariaDB Exporter - Batch Configuration
#
# This file controls batching behavior for each Redis stream.
# Settings match the core-collection OpenSearch indexer for consistency.
#
# Parameters:
#   batch_size - Number of messages to read from Redis per XREADGROUP call
#   bulk_size  - Number of records to buffer before writing to MariaDB
#
# Lower values = more real-time but higher overhead
# Higher values = more efficient but increased latency

[stream:alerts]
# Alerts - Process immediately (real-time requirement)
batch_size = 1
bulk_size = 1

[stream:logs]
# Logs - Moderate batching
batch_size = 5
bulk_size = 5

[stream:stats]
# Stats - High volume, batch for efficiency
batch_size = 20
bulk_size = 100

[stream:devices]
# Devices - Low volume, process immediately
batch_size = 1
bulk_size = 1

[stream:services]
# Services - Low volume, process immediately
batch_size = 1
bulk_size = 1
