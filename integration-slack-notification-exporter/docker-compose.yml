version: '3.8'

services:
  slack-notification-exporter:
    image: ghcr.io/${GHCR_USER:-ennissh}/integration-slack-notification-exporter:latest
    container_name: rapax-slack-notification-exporter
    restart: unless-stopped
    networks:
      - rapax-network
    volumes:
      # Write logs to rapax logs directory
      - ${RAPAXHOME:-/opt/rapax}/logs:/opt/rapax/logs
      # Read rapax library (read-only)
      - ${RAPAXHOME:-/opt/rapax}/lib:/opt/rapax/lib:ro
      # Read rapax config (read-only)
      - ${RAPAXHOME:-/opt/rapax}/etc:/opt/rapax/etc:ro
    environment:
      - REDIS_HOST=${REDIS_HOST:-rapax-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - COMPONENT_ID=${COMPONENT_ID:-slack-notification-exporter-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rapax-network:
    external: true
    name: ${RAPAX_NETWORK:-rapax-dev-network}
